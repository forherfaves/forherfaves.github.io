<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Her Faves</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fdf8f5;
            color: #2d2d2d;
            min-height: 100vh;
        }

        header {
            background: white;
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid #f0e8e0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #2d2d2d;
        }

        header p {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            padding: 32px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.10);
        }

        .card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .card-body {
            padding: 16px;
        }

        .card-category {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #c9956d;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .card-name {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-price {
            font-size: 18px;
            font-weight: 700;
            color: #2d2d2d;
            margin-bottom: 14px;
        }

        .shop-btn {
            display: block;
            background: #2d2d2d;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .shop-btn:hover {
            background: #c9956d;
        }

        .empty {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }

        footer {
            text-align: center;
            padding: 32px 20px;
            font-size: 12px;
            color: #bbb;
        }

        @media (max-width: 400px) {
            .grid { grid-template-columns: 1fr; padding: 16px; }
            header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1>For Her Faves</h1>
    <p>Curated picks, just for you</p>
</header>

<div class="grid" id="grid">
    <div class="empty">Loading latest picks...</div>
</div>

<footer>
    <p>As an Amazon Associate I earn from qualifying purchases.</p>
</footer>

<script>
    fetch('products.json')
        .then(r => r.json())
        .then(data => {
            const grid = document.getElementById('grid');
            
            if (!data.products || data.products.length === 0) {
                grid.innerHTML = '<div class="empty">New picks coming soon! Follow us on Instagram @forherfaves</div>';
                return;
            }

            grid.innerHTML = data.products.map(p => `
                <div class="card">
                    <img src="${p.image_url}" alt="${p.name}" loading="lazy">
                    <div class="card-body">
                        <div class="card-category">${p.category}</div>
                        <div class="card-name">${p.name}</div>
                        <div class="card-price">${p.price}</div>
                        <a href="${p.affiliate_link}" class="shop-btn" target="_blank">Shop Now</a>
                    </div>
                </div>
            `).join('');
        })
        .catch(() => {
            document.getElementById('grid').innerHTML = '<div class="empty">New picks coming soon!</div>';
        });
</script>

</body>
</html>
